overview: "Find what's missing and related in your library and build a todo list to complete it."
imageUrl: "https://raw.githubusercontent.com/IDisposable/jellyfin-plugin-mindthegaps/main/assets/social.png"
description: >
  Scans your library for gaps (missing movies in partially-owned collections and franchises, missing
  series content, and unowned titles from actor and director filmographies) using TMDB, TheTVDB, and
  TVmaze. Presents an easy todo list for filling out your collection, surfaces where to watch each
  item, and can optionally mint native virtual placeholders for missing collection movies.
category: "General"
owner: "idisposable"
artifacts:
- "Jellyfin.Plugin.MindTheGaps.dll"
changelog: >
  10.11.0.10 - Reliability and polish ahead of 1.0. The scan and the background "where to watch" pass no
  longer overwrite each other, so results from a scan that finishes mid-pass are kept. Tab counts now match
  the filtered list, and "Hide items with no sources" hides only titles already looked up and found empty,
  not ones not yet checked. Your scroll position, expanded groups, and selection are kept when a row is
  resolved or a filter changes. The provider filter is populated from the saved report, collapses into a
  compact list, gains enable-all and disable-all controls, and now actually re-filters the list when
  changed. Concurrent minting can no longer create duplicate collections.
