overview: "Find what's missing and related in your library and build a todo list to complete it."
imageUrl: "https://raw.githubusercontent.com/IDisposable/jellyfin-plugin-mindthegaps/main/assets/social.png"
description: >
  Scans your library for gaps (missing movies in partially-owned collections and franchises, missing
  series content, and unowned titles from actor and director filmographies) using TMDB, TheTVDB, and
  TVmaze. Presents an easy todo list for filling out your collection, surfaces where to watch each
  item, and can optionally mint native virtual placeholders for missing collection movies.
category: "General"
owner: "idisposable"
artifacts:
- "Jellyfin.Plugin.MindTheGaps.dll"
changelog: >
  10.11.0.14 (pre-release) - One page, faster big tabs, and self-updating "where to watch". Settings now
  live on the report page: the gear opens an inline settings panel (accordion) and closes the report, so the
  plugin has a single sidebar entry. The A-Z bar is now a selector that renders one letter group at a time
  (with a leading "*" for all), on every tab including Set completion, and Creator works builds each group's
  rows only when you expand it, so a tab with tens of thousands of rows opens quickly. A small green dot marks
  a collapsed group that has a streaming source. Music gaps split by how you own the artist: an album artist
  you collect yields a Set-completion discography, an artist you only own a track by yields a Creator-works
  "artist works" list. "Where to watch" stays current on its own: a new "Refresh where to watch" scheduled
  task drains the whole backlog, a looked-up result is served instantly while a refresh runs behind the
  scenes, and the cache lifetime is settable (default 24 hours). Fix: a music set's search button now searches
  music instead of box sets.
