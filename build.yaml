changelog: >
  10.11.1.1 (pre-release) - Diagnose, deeper. A new Diagnose action explains why a gap is reported missing: a
  per-gap popup lays the gap and the owned items that look like it side by side, and leads with a plain
  verdict (owned under the wrong id, an owned item already holds this id, the gap looks stale, a wrong kind of
  id, or genuinely missing). It corroborates by IMDb and TheTVDB id, so it still catches a title you own under
  a localized name, and a "Deeper analysis" button confirms against the source provider and fills in missing
  ids. A library-wide identification audit runs the same check across the whole library and downloads as
  Markdown, with a link on each finding back into Jellyfin. Also in this build: a JustWatch search button on
  movie and show rows that lack a JustWatch link (using your configured region); the Set completion tab now
  groups by kind of set (collections and franchises, studios, keywords, and music discographies); provider
  overviews are stripped of stray HTML and episode and season rows gained their missing search and open icons;
  a fresh install opens to settings until the first scan; and the settings panel warns about unsaved changes.
  This is the first build on the new beta release channel.
