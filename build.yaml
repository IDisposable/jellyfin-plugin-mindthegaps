changelog: >
  10.11.4.2 - The gaps report and the settings are separate dashboard pages. The report opens without the
  settings form attached, and the plugin's Settings button opens the settings. Resetting the scan rotation
  and removing minted items are on the report now, under Maintenance, beside the library they act on.
  Shared report links and exported audit dossiers still open the report.
