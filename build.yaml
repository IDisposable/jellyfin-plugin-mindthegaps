changelog: >
  10.11.3.8 - Series completeness is more accurate and now follows your library's own providers. Each series
  is checked against every metadata provider your Shows library uses (TheMovieDb, TheTVDB, TVmaze), merged
  season by season in your configured order so your preferred provider is the authority, a lower-ranked one
  can only add a season none above it lists, and your own missing-episode list is the last-chance fallback;
  a stale or wrong season no longer reports every episode as missing. Episodes are reconciled by air date and
  folded title, not just number, so a provider that renumbers, reorders, or merges a two-part episode no
  longer flags your owned episodes as missing. The separate per-provider cross-check checkboxes are gone
  (TheTVDB still needs its API key). You can re-check a single series for missing episodes without a full
  rescan. The identification audit and the Diagnose popup now cover music albums and books, not just movies
  and shows. Row titles are larger and each source's section can be collapsed.
