changelog: >
  10.11.3.6 - A personal todo list: an Add to my TODO action on any gap, a My TODO list modal that groups what
  you saved by domain and verifies each item against your library, and a Markdown checklist export. Minting
  now covers any domain, not just movies: a missing series, album, or book becomes a tagged, reversible
  virtual placeholder attached to its set, artist, or author. A long-running show you only partly own keeps
  its earlier and later missing seasons listed instead of hiding them as a same-named reboot. A new Detailed
  API logging toggle logs every external API request and response to the server log, for debugging a source
  or acquisition target that is not behaving.
