changelog: >
  10.11.3.5 - Creator works now surfaces an owned actor or director's missing series, not just their films,
  and the music and book sources are on by default. Settings are regrouped into Complete what you own and
  Discover new titles, and TMDB lists gain their own Scan TMDB lists toggle. Explore a source moved out of
  settings onto a button on the report, so trying a source no longer touches the settings form. The Diagnose
  popup gains Export for AI analysis, a Markdown dossier you can hand to any AI to work out why a title was
  not matched. A title that is on a curated TMDB or MDBList list and is also recommended now groups under the
  list in Discover. You can send a missing movie or series to Radarr, Sonarr, or Jellyseerr from the report.
  The MDBList search no longer fails on a stray character.
