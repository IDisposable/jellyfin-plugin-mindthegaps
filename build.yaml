changelog: >
  10.11.1.2 (pre-release) - Sharper diagnosis, easier exports. The Diagnose action now weighs both title and
  year, so a remake that shares a name with something you own (the 1960 Ocean's Eleven against the 2001 remake,
  the original Home Alone against the 2023 reboot) is no longer reported as that owned title under the wrong
  id; a year more than one apart is treated as a different release, while a missing year still falls back to
  the title match. The Markdown exports gained structure and a table of contents: the gap export groups each
  domain by its kind of source (collections and franchises, studios, keywords, series, and discographies), and
  the identification audit groups its findings by reason, each with contents links to jump between sections.
  Titles that begin with "The" now file under both T and the next word's letter, so "The Highlander" is also
  found under H. Curated keyword sets show the keyword's name instead of its numeric id.
