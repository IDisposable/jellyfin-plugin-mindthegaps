version: "10.11.0.16"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Find what's missing and related in your library and build a todo list to complete it."
imageUrl: "https://raw.githubusercontent.com/IDisposable/jellyfin-plugin-mindthegaps/main/assets/social.png"
description: >
  Scans your library for gaps (missing movies in partially-owned collections and franchises, missing
  series content, and unowned titles from actor and director filmographies) using TMDB, TheTVDB, and
  TVmaze. Presents an easy todo list for filling out your collection, surfaces where to watch each
  item, and can optionally mint native virtual placeholders for missing collection movies.
category: "General"
owner: "idisposable"
artifacts:
- "Jellyfin.Plugin.MindTheGaps.dll"
- "TMDbLib.dll"
- "Newtonsoft.Json.dll"
changelog: >
  10.11.0.16 - Sturdier scans against flaky APIs. Every external service call now retries rate-limit and
  transient failures (honouring Retry-After) instead of dropping the lookup, a service that keeps failing is
  set aside for a couple of minutes so the scan moves on to the others rather than stalling, the scan saves
  its progress to disk as it goes so a crash or restart no longer loses the batch, and every request now
  identifies the plugin (with its version) to the API.
