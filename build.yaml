changelog: >
  10.11.0.8 - Missing-episode rows now show where to watch the show. Availability look-ups are grouped
  by title (episodes of a series share one call) and remember when a title has no sources, showing "No
  streaming sources found" instead of a look-up that comes back empty. The report is version-stamped and
  nudges you to rescan after a plugin upgrade (rebuilds stale links). Fixed group headers not toggling
  after navigating away and back. Creator Works and Recommendations letter groups start collapsed, plus
  a back-to-top button. The watch-page link is now "Watch", next to "Where to watch:". Settings page
  reorganized into labelled sections.
