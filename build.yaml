overview: "Find what's missing and related in your library and build a todo list to complete it."
imageUrl: "https://raw.githubusercontent.com/IDisposable/jellyfin-plugin-mindthegaps/main/assets/social.png"
description: >
  Scans your library for gaps (missing movies in partially-owned collections and franchises, missing
  series content, unowned titles from actor and director filmographies, and related recommendations)
  using TMDB, Trakt, TheTVDB, and TVmaze, with music and book sources (MusicBrainz, OpenLibrary,
  Discogs). Presents an easy todo list for filling out your collection, diagnoses why a
  title is reported missing, surfaces where to watch each item, and can optionally mint native virtual
  placeholders for missing items.
category: "General"
