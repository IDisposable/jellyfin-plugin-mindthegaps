changelog: >
  10.11.0.13 - Report polish, accessibility, and a settings-link fix. The plugin's "Settings" button on
  the Plugins page now opens the configuration page instead of the report, and the report shows the
  installed plugin version next to the gear. Group headers use compact icons for resolve and not-interested,
  ordered search, open in Jellyfin, resolve, not-interested; a collapsed entry shows just the coverage
  percent (the full count on hover). The Markdown export now includes a search link for each gap. With one
  media domain shown at a time, the redundant top-level Movies/Shows group is gone and the summary line
  reads a little larger. Every icon control now has an accessible label so a screen reader announces the
  action. Fixes: the Type filter stacking onto two lines, and collapsed grid cells reflowing on hover.
