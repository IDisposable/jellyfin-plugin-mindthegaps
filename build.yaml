changelog: >
  10.11.3.2 - MDBList community lists and TMDB lists join as discovery sources, so you can complete or
  explore a curated list the way you complete a collection. The Discover tab now groups its results by
  source, collapsing each list or recommending title under its own name to match the Markdown export. Tab
  and group labels follow the media type in view (Series completion for shows, Discography and Artist works
  for music, Author works for books, and Discover for recommendations), and shareable view links now stay
  within URL length limits.
