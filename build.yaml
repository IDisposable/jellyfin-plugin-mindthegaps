changelog: >
  10.11.0.6 - External links now open in the system browser on mobile. Report polish: settings gear,
  tidier header, "Mind the Gap ToDo List" title, providers shown as a list with one watch button,
  minty Mint buttons, a per-provider "where to watch" filter, and a Recommendations pivot (grouped by
  target, recommending source on expand). Minting now lives entirely on the report: per-row and
  multi-select "Mint selected" (checkbox rows), run in the background with live progress; the settings
  page keeps only "Remove minted". Minted placeholders are reconciled automatically at the end of every
  scan once the library owns the real file. External links are now extensible: each gap's links merge
  whatever the host's own providers emit (TMDB/IMDb from core, JustWatch if that plugin is installed)
  with the built-in list, and the report keeps "Where to watch" flush right as the link row grows. New
  opt-in scan-time availability with a "Hide items with no sources" filter and a one-click enable. Each
  minted item now gets a metadata refresh.
