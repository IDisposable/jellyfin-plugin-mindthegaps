changelog: >
  10.11.0.7 - Availability now runs as a background "Look up where to watch" pass instead of slowing the
  scan. Rows link to IMDb/TheTVDB, not just TMDB; fixed TheTVDB episode/season 404s. New "Open in
  Jellyfin" icons (show/season/item, new tab). Recommendations show the recommending title's year and
  kind and link to it. Creator Works and Recommendations now group alphabetically (Unicode-aware). The
  report is saved atomically.
