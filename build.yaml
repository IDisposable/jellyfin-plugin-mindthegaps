changelog: >
  10.11.3.7 - A transient provider failure mid-scan (a TMDB or music-source hiccup) no longer blanks a
  collection's or a discography's gaps from the report. A multi-episode file (S01E01-E02) is counted across
  its whole span, so its later parts no longer read as missing. A failed report load now shows an error
  instead of spinning forever, and no API key reaches the server log. Discogs fills the gaps in a
  MusicBrainz-covered artist's discography, surfacing the albums one provider lists and the other misses.
  The Diagnose popup verifies an episode by its number, and when the number is absent but you own the same
  title at another number (a two-part or off-by-one numbering mismatch) it points you to renumber the file
  rather than calling the episode missing.
