changelog: >
  10.11.2.0 - The first public release since 10.11.1.0, rolling up the 10.11.1.x betas. The headline is
  Diagnose: a per-gap popup explains why something is reported missing, laying the gap and the owned items
  that look like it side by side and leading with a plain verdict (owned under the wrong id, an owned item
  already holds this id, stale, a wrong kind of id, or genuinely missing); a "Deeper analysis" button confirms
  against the source provider, and a library-wide identification audit runs the same check and downloads as
  Markdown. Diagnosis weighs both title and year, so a remake that shares a name with something you own (the
  1960 Ocean's Eleven against the 2001 remake) is no longer reported as that title under the wrong id. Curated
  studio and keyword sets are now chosen with a type-ahead chip picker (search TheMovieDb, pick a match, it
  becomes a removable chip), keyboard and screen-reader accessible, and the Set completion tab groups by kind
  of set (collections and franchises, studios, keywords, series, and discographies). The Markdown exports
  gained structure: grouped sections, a table of contents, and native collapsible blocks (closed by default)
  for a large export. Also: a JustWatch search button on rows that lack a JustWatch link; titles that begin
  with "The" file under both T and the next word's letter; provider overviews are stripped of stray HTML and
  episode and season rows gained their search and open icons; a fresh install opens to settings until the
  first scan; and the settings panel warns about unsaved changes. Breaking change: the old free-text
  studio-names field was removed in favor of the chip picker, so any studios configured by name (rather than
  id) are dropped and must be re-picked.
