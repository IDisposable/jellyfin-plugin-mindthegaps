changelog: >
  10.11.1.0 - Initial release. Mind the Gaps scans your library and builds a dashboard todo list of what is
  missing or worth adding: movies missing from a collection or franchise; missing seasons and episodes
  (optionally cross-checked against TVmaze and TheTVDB); films from an owned actor or director's filmography
  (with an independent Trakt cross-check); curated studio and keyword sets; and TMDB recommendations.
  Experimental music and books sources are included too. It shows where to watch each gap, links out to TMDB,
  IMDb, TheTVDB, and JustWatch, and can optionally mint reversible virtual placeholders for missing collection
  movies.
