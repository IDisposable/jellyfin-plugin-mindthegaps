changelog: >
  10.11.3.4 - Explore a source ad-hoc: a Run now beside each studio, keyword, Discogs label, TMDB list, and
  MDBList list picker finds its unowned titles and adds them straight to the report without a full scan, so
  you can try a source before committing to it; Clear explorations removes them again, and a later full scan
  drops any you did not save. Also fixes a provider link on a group header that also collapsed the group, and
  stops the browser from offering to save the API key fields as a login password.
