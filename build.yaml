changelog: >
  10.11.4.1 - Fixes installing on a server running an earlier 10.11 patch. The plugin declares the 10.11.0.0
  ABI but was built against the 10.11.11 assemblies, which stamp their own patch number, so the package asked
  any server for 10.11.11 and a server on an earlier patch refused to load it. It is now built against 10.11.0
  and loads on any 10.11.x server. In the TODO list, the source column now says what it is showing, using the
  same wording as the report's section buttons (the series for an episode, Discover for a recommendation, the
  creator, the set), instead of a bare name that read as a wrong series when you added a whole show. A movie or
  show with no JustWatch link of its own now gets a JustWatch search there too, both in the list and in the
  Markdown export.
