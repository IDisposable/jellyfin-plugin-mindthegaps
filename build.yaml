changelog: >
  10.11.2.1 (beta) - A new Discogs source completes curated record labels and an owned artist's discography
  (needs a Discogs token), chosen with the same type-ahead chip picker as studios and keywords.
  Diagnose goes deeper and wider: a networked "Deeper analysis" compares external ids to tell a real
  misidentification from a coincidental title clash, episode and season gaps now have their own diagnosis that
  spots a same-named reboot mis-tagged onto a series (the V 1984 versus V 2009 case), and album and book gaps
  are diagnosable too. The library no longer reports a reboot's later seasons as missing episodes of the
  single-season original, and a Name-plus-year match now prefers an exact-year hit over the one-year
  tolerance. Under the hood every external call now sits behind a read-through cache with proactive per-service
  rate pacing (MusicBrainz and Discogs), a circuit breaker that moves the scan past a down service, and longer
  caching of stable id-to-name lookups; the scan runs its sources concurrently and streams results into the
  report per item, so a slow provider no longer holds up the others and gaps appear as they are found. The
  Books (OpenLibrary) source is hardened against real-world author data. The dashboard is now
  authored as separate report, settings, CSS, and JS files and concatenated at build time (no visible change).
