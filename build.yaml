changelog: >
  10.11.1.3 (pre-release) - Curated sets get a chip picker, exports collapse. Studios and keywords are now
  chosen with a type-ahead chip picker: search TheMovieDb, pick a match, and it becomes a removable chip, so
  you never touch a numeric id; the picker is keyboard and screen-reader accessible. Breaking change: the old
  free-text studio-names field is gone, so any studios configured by name (rather than id) are dropped and
  must be re-picked. The Markdown exports gained native
  collapsible sections (closed by default) so a large export opens to a scannable list: the gap export lists
  each individual studio, keyword, or collection on its own, and the identification audit makes each finding
  and each duplicate-id group its own collapsible. The audit's open-in-Jellyfin links were also fixed to
  render correctly.
