changelog: >
  10.11.2.2 (beta) - Every gap now links out to its providers. Music rows link to MusicBrainz and Discogs,
  book rows to OpenLibrary, and each creator or set group header links the source itself: an author's
  OpenLibrary page, an actor or director's TMDB page, an artist's MusicBrainz or Discogs page, and a studio,
  keyword, label, or collection page, so you can open the creator or set, not just its missing items. The
  Diagnose popup's MusicBrainz, Discogs, and OpenLibrary ids are clickable just like the TMDB, IMDb, and
  TheTVDB ones. For theming, every provider link carries a per-provider CSS class (cgProvider-tmdb,
  cgProvider-discogs, and so on) and a data-provider attribute, so a stylesheet can inject service icons (see
  the README's Advanced CSS customization section). In settings, the Discogs toggle and token move into the
  Data sources section with the other providers, and the Webhook URL moves to the bottom of it. The Markdown
  export filename now includes the domain, so Movies and Music exports of the same tab no longer overwrite
  each other.
