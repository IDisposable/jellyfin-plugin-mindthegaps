changelog: >
  10.11.3.10 - Two new opt-in sources, each with its own settings. Complete a Books subject from OpenLibrary
  (for example every book tagged science fiction or fantasy) under Complete what you own, and discover the
  unowned movies and shows on a Trakt list under Discover new titles. The TMDB-list setting now accepts a
  pasted themoviedb.org/list URL, not just a bare id. In the Shows set-completion view each series shows its
  year in the header, so a reboot is told apart from the original (Quantum Leap 1989 versus 2022).
