<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Mind the Gaps Jellyfin Plugin">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14151b"/>
      <stop offset="1" stop-color="#0a0b0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#aa5cc3"/>
      <stop offset="1" stop-color="#00a4dc"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1140" cy="110" r="380" fill="url(#accent)" opacity="0.12"/>
  <circle cx="120" cy="600" r="260" fill="url(#accent)" opacity="0.08"/>

  <!-- mark: a 2x2 grid of library tiles with one missing (the gap) -->
  <g transform="translate(150 232)">
    <rect x="0"   y="0"   width="80" height="80" rx="18" fill="url(#accent)"/>
    <rect x="104" y="0"   width="80" height="80" rx="18" fill="url(#accent)"/>
    <rect x="0"   y="104" width="80" height="80" rx="18" fill="url(#accent)"/>
    <rect x="104" y="104" width="80" height="80" rx="18" fill="none" stroke="#aa5cc3" stroke-width="4" stroke-dasharray="11 9"/>
  </g>

  <!-- wordmark -->
  <text x="380" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="#ffffff">Mind the Gaps</text>
  <text x="384" y="392" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="500" fill="#aa5cc3">Jellyfin Plugin</text>

  <!-- tagline -->
  <text x="152" y="522" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="33" fill="#b8bcc8">Find what's missing and related across your library</text>

  <rect x="152" y="556" width="976" height="6" rx="3" fill="url(#accent)" opacity="0.55"/>
</svg>
