<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Mind the Gaps</title>
</head>
<body>
    <div id="MindTheGapsPage" data-role="page" class="page type-interior" data-require="emby-button,emby-input,emby-select,emby-checkbox,emby-linkbutton,paper-icon-button-light">
        <style>@@MTG_CSS@@</style>
        <div data-role="content">
            <div class="content-primary">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle" id="cgPageTitle">Mind the Gaps ToDo List</h2>
                    <span id="cgVersion" class="fieldDescription" style="margin-left:auto;margin-right:.4em;opacity:.6;" title="Installed plugin version"></span>
                    <button is="paper-icon-button-light" type="button" id="cgSettings" title="Plugin settings" aria-label="Plugin settings" aria-expanded="false">
                        <span class="material-icons" aria-hidden="true">settings</span>
                    </button>
                </div>
                @@MTG_REPORT@@@@MTG_CONFIG@@<div id="cgDiagModal" role="dialog" aria-modal="true" aria-labelledby="cgDiagTitle"
            style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
            <div style="background:#101418;color:#eee;max-width:580px;width:92%;max-height:82vh;overflow:auto;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.6);padding:1.1em 1.3em;">
                <div style="display:flex;align-items:center;gap:.4em;margin-bottom:.5em;">
                    <span class="material-icons" aria-hidden="true">troubleshoot</span>
                    <h2 id="cgDiagTitle" style="margin:0;font-size:1.15em;flex:1;min-width:0;">Diagnose</h2>
                    <button is="paper-icon-button-light" type="button" id="cgDiagClose" title="Close" aria-label="Close">
                        <span class="material-icons" aria-hidden="true">close</span>
                    </button>
                </div>
                <div id="cgDiagBody"></div>
            </div>
        </div>

        <script type="text/javascript">@@MTG_JS@@</script>
    </div>
</body>
</html>
